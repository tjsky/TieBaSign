name: Keepalive Workflow

on:
  schedule:
    - cron: '30 5 1,15 * *' 
  workflow_dispatch:    

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Keepalive Git Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          mkdir -p .github
          echo "Last keepalive run: $(date)" > .github/keepalive.txt
          
          git add .github/keepalive.txt
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: keepalive [skip ci]" && git push)
